<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostDB Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/force-graph"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: { 900: '#0a0a0a', 800: '#171717', 700: '#262626' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-gray-200 font-sans antialiased h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-dark-800 border-r border-dark-700 flex flex-col">
        <div class="h-14 flex items-center px-6 border-b border-dark-700">
            <span class="material-symbols-outlined mr-2 text-white">database</span>
            <span class="font-semibold text-white tracking-wide">GhostDB</span>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Collections</div>
            <ul id="collection-list" class="space-y-1">
                <!-- Injected via JS -->
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-dark-900">
        
        <!-- Header -->
        <header class="h-14 flex items-center justify-between px-6 border-b border-dark-700 bg-dark-900/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center text-sm">
                <span class="text-gray-500">Database</span>
                <span class="material-symbols-outlined text-gray-500 text-sm mx-1">chevron_right</span>
                <span id="current-collection-name" class="text-gray-200 font-medium">Select Collection</span>
            </div>
            
            <div class="flex items-center space-x-2">
                <div class="bg-dark-800 border border-dark-700 rounded-md flex p-0.5">
                    <button id="tab-table" onclick="switchTab('table')" class="px-3 py-1 text-sm rounded-sm bg-dark-700 text-white font-medium transition-colors">Table</button>
                    <button id="tab-graph" onclick="switchTab('graph')" class="px-3 py-1 text-sm rounded-sm text-gray-400 hover:text-white transition-colors">Graph</button>
                </div>
                <button id="btn-add" class="hidden bg-white text-black px-3 py-1.5 rounded-md text-sm font-medium hover:bg-gray-200 transition-colors flex items-center shadow-sm">
                    <span class="material-symbols-outlined text-[18px] mr-1">add</span> Add Data
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-hidden relative">
            
            <!-- Table View -->
            <div id="view-table" class="h-full overflow-y-auto p-6 hidden">
                <div id="table-container" class="bg-dark-800 border border-dark-700 rounded-lg shadow-sm overflow-hidden hidden">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-dark-900/50 border-b border-dark-700 text-gray-400">
                            <tr id="table-head">
                                <!-- Injected via JS -->
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-dark-700">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
                
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-gray-500 pt-20">
                    <span class="material-symbols-outlined text-4xl mb-2 opacity-50">data_object</span>
                    <p>Select a collection or add data to get started.</p>
                </div>
            </div>

            <!-- Graph View -->
            <div id="view-graph" class="h-full w-full hidden bg-dark-900 relative">
                <div id="graph-container" class="w-full h-full"></div>
                <!-- Tombol Reset / Recenter -->
                <button id="btn-center-graph" class="absolute bottom-6 right-6 bg-dark-800 border border-dark-700 text-gray-300 p-2 rounded-full shadow-lg hover:text-white hover:bg-dark-700 transition-colors flex items-center justify-center z-10" title="Center Graph">
                    <span class="material-symbols-outlined text-[20px]">my_location</span>
                </button>
            </div>
            
        </div>
    </main>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-dark-800 border border-dark-700 rounded-xl shadow-2xl w-full max-w-md transform scale-95 transition-transform overflow-hidden">
            <div class="px-6 py-4 border-b border-dark-700 flex justify-between items-center bg-dark-900/50">
                <h3 class="font-medium text-white" id="modal-title">Add JSON Data</h3>
                <button id="btn-close-modal" class="text-gray-400 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-400 mb-1">ID (Auto or Custom)</label>
                    <input type="text" id="input-id" class="w-full bg-dark-900 border border-dark-700 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-gray-500 transition-colors" placeholder="e.g. user_123">
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-400 mb-1">JSON Payload</label>
                    <textarea id="input-json" rows="6" class="w-full bg-dark-900 border border-dark-700 rounded-md px-3 py-2 text-sm text-white font-mono focus:outline-none focus:border-gray-500 transition-colors" placeholder='{"name": "Al"}'></textarea>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button id="btn-cancel" class="px-4 py-2 text-sm text-gray-400 hover:text-white transition-colors">Cancel</button>
                    <button id="btn-save" class="bg-white text-black px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-200 transition-colors">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
