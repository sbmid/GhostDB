<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostDB V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://unpkg.com/force-graph"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-bg-primary text-text-primary h-screen flex overflow-hidden font-outfit antialiased transition-colors duration-300">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="absolute inset-0 bg-bg-primary z-50 flex items-center justify-center transition-colors duration-300">
        <div class="bg-bg-secondary p-8 rounded-xl shadow-2xl border border-border-color w-96 flex flex-col items-center">
            <span class="material-symbols-outlined text-[48px] text-text-primary mb-4">database</span>
            <h1 class="text-2xl font-bold text-text-primary mb-2">GhostDB</h1>
            <p class="text-text-secondary text-sm mb-6 text-center">Schemaless JSON Database</p>
            
            <input type="password" id="login-password" placeholder="Password (default: 12345678)" class="w-full bg-bg-primary border border-border-color text-text-primary p-3 rounded-lg focus:outline-none focus:border-purple-500 mb-4 transition-colors">
            
            <button id="btn-login" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg shadow-md transition-all active:scale-95">Login</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden">Password salah!</p>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="w-full md:w-64 bg-bg-secondary border-r border-border-color flex flex-col transition-colors duration-300 absolute md:relative z-30 h-full -translate-x-full md:translate-x-0 transition-transform" id="sidebar">
        <div class="p-5 flex items-center justify-between border-b border-border-color">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-text-primary text-[24px]">database</span>
                <span class="font-bold text-lg text-text-primary tracking-wide">GhostDB</span>
            </div>
            <button id="btn-close-sidebar" class="md:hidden text-text-secondary hover:text-text-primary">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <div class="p-3">
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-text-secondary text-[18px]">search</span>
                <input type="text" id="search-collection" placeholder="Search collection..." class="w-full bg-bg-primary text-text-primary text-sm pl-9 pr-3 py-2 rounded-md focus:outline-none border border-border-color focus:border-text-secondary transition-colors">
            </div>
        </div>

        <div class="p-3 flex justify-between items-center text-xs font-semibold text-text-secondary uppercase tracking-wider">
            <span>Collections</span>
            <button id="btn-add-collection" class="hover:text-text-primary" title="New Collection">
                <span class="material-symbols-outlined text-[16px]">add</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar px-2" id="collection-list">
            <!-- Koleksi bakal dirender di sini via JS -->
        </div>
        
        <!-- SIDEBAR FOOTER (Settings & Logout) -->
        <div class="p-4 border-t border-border-color flex justify-between items-center bg-bg-secondary">
            <button id="btn-settings" class="text-text-secondary hover:text-text-primary flex items-center gap-2 transition-colors" title="Settings">
                <span class="material-symbols-outlined text-[20px]">settings</span>
            </button>
            <button id="btn-toggle-theme" class="text-text-secondary hover:text-text-primary transition-colors" title="Toggle Theme">
                <span class="material-symbols-outlined text-[20px]" id="theme-icon">light_mode</span>
            </button>
            <button id="btn-logout" class="text-red-500 hover:text-red-400 transition-colors" title="Logout">
                <span class="material-symbols-outlined text-[20px]">logout</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col bg-bg-primary min-w-0 transition-colors duration-300">
        <!-- HEADER -->
        <header class="h-16 border-b border-border-color flex items-center justify-between px-4 lg:px-6 bg-bg-primary transition-colors duration-300">
            <div class="flex items-center gap-3">
                <button id="btn-menu" class="md:hidden text-text-secondary hover:text-text-primary">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h2 id="current-col-name" class="font-semibold text-text-primary text-lg truncate">Select Collection</h2>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="bg-bg-secondary p-1 rounded-lg border border-border-color flex">
                    <button id="tab-table" class="px-3 py-1 text-sm rounded-md bg-text-primary text-bg-primary font-medium transition-colors" onclick="switchTab('table')">Table</button>
                    <button id="tab-graph" class="px-3 py-1 text-sm rounded-md text-text-secondary hover:text-text-primary transition-colors" onclick="switchTab('graph')">Graph</button>
                </div>
                <button id="btn-add" class="ml-2 bg-text-primary text-bg-primary hover:bg-text-secondary px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1 hidden">
                    <span class="material-symbols-outlined text-[18px]">add</span>
                    <span class="hidden sm:inline">Add Data</span>
                </button>
            </div>
        </header>

        <!-- CONTENT AREA -->
        <div class="flex-1 overflow-hidden relative">
            
            <!-- Table View -->
            <div id="view-table" class="h-full w-full flex flex-col">
                <!-- Search Data Bar -->
                <div class="p-4 border-b border-border-color bg-bg-secondary flex items-center gap-3 hidden" id="data-toolbar">
                    <span class="material-symbols-outlined text-text-secondary">search</span>
                    <input type="text" id="search-data" placeholder="Search data by ID or content..." class="w-full bg-transparent text-text-primary focus:outline-none text-sm">
                </div>

                <div class="flex-1 overflow-auto custom-scrollbar p-4 lg:p-6">
                    <div class="w-full overflow-x-auto rounded-xl border border-border-color bg-bg-secondary shadow-sm">
                        <table class="w-full text-left text-sm text-text-primary border-collapse">
                            <thead class="bg-bg-tertiary text-text-secondary text-xs uppercase border-b border-border-color">
                                <tr id="table-head">
                                    <th class="px-6 py-4 font-semibold w-1/4">ID</th>
                                    <th class="px-6 py-4 font-semibold">Data</th>
                                    <th class="px-6 py-4 font-semibold w-24 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-border-color">
                                <!-- Data render via JS -->
                            </tbody>
                        </table>
                        
                        <div id="empty-state" class="p-12 text-center text-text-secondary flex flex-col items-center">
                            <span class="material-symbols-outlined text-[48px] mb-3 opacity-50">folder_open</span>
                            <p class="text-sm">Select a collection or add new data</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Graph View -->
            <div id="view-graph" class="h-full w-full hidden bg-bg-primary relative">
                <div id="graph-container" class="w-full h-full"></div>
                <button id="btn-center-graph" class="absolute bottom-6 right-6 bg-bg-secondary border border-border-color text-text-secondary p-2 rounded-full shadow-lg hover:text-text-primary transition-colors flex items-center justify-center z-10" title="Center Graph">
                    <span class="material-symbols-outlined text-[20px]">my_location</span>
                </button>
            </div>
            
        </div>
    </main>

    <!-- MODAL EDIT/ADD DATA -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-bg-secondary w-[90%] max-w-2xl rounded-2xl shadow-2xl border border-border-color flex flex-col max-h-[90vh] scale-95 transition-transform duration-200" id="modal-content">
            <div class="p-4 border-b border-border-color flex justify-between items-center bg-bg-tertiary rounded-t-2xl">
                <h3 class="font-semibold text-text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">data_object</span>
                    Data Editor
                </h3>
                <button id="btn-close-modal" class="text-text-secondary hover:text-text-primary">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-4 flex flex-col gap-4 overflow-y-auto custom-scrollbar flex-1">
                <div>
                    <label class="block text-xs font-semibold text-text-secondary mb-1 uppercase tracking-wider">Document ID</label>
                    <input type="text" id="input-id" class="w-full bg-bg-primary border border-border-color text-text-primary px-3 py-2 rounded-md focus:outline-none focus:border-text-secondary font-mono text-sm transition-colors" placeholder="e.g. user_123">
                </div>
                <div class="flex-1 flex flex-col min-h-[300px]">
                    <label class="block text-xs font-semibold text-text-secondary mb-1 uppercase tracking-wider">JSON Data</label>
                    <textarea id="input-json" class="w-full flex-1 bg-bg-primary border border-border-color text-text-primary px-3 py-2 rounded-md focus:outline-none focus:border-text-secondary font-mono text-sm custom-scrollbar transition-colors" placeholder="{&#10;  &#34;key&#34;: &#34;value&#34;&#10;}"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-border-color flex justify-end gap-3 bg-bg-tertiary rounded-b-2xl">
                <button id="btn-cancel" class="px-4 py-2 text-sm font-medium text-text-secondary hover:text-text-primary transition-colors">Cancel</button>
                <button id="btn-save" class="px-4 py-2 text-sm font-medium bg-text-primary text-bg-primary hover:bg-text-secondary rounded-lg shadow-sm transition-all active:scale-95 flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">save</span>
                    Save Data
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL SETTINGS -->
    <div id="modal-settings" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-bg-secondary w-[90%] max-w-md rounded-2xl shadow-2xl border border-border-color flex flex-col scale-95 transition-transform duration-200" id="modal-settings-content">
            <div class="p-4 border-b border-border-color flex justify-between items-center bg-bg-tertiary rounded-t-2xl">
                <h3 class="font-semibold text-text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">settings</span>
                    Settings
                </h3>
                <button id="btn-close-settings" class="text-text-secondary hover:text-text-primary">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <h4 class="text-text-primary font-medium border-b border-border-color pb-2">Change Password</h4>
                <div>
                    <label class="block text-xs font-semibold text-text-secondary mb-1 uppercase">Old Password</label>
                    <input type="password" id="input-old-pass" class="w-full bg-bg-primary border border-border-color text-text-primary px-3 py-2 rounded-md focus:outline-none focus:border-text-secondary transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-secondary mb-1 uppercase">New Password</label>
                    <input type="password" id="input-new-pass" class="w-full bg-bg-primary border border-border-color text-text-primary px-3 py-2 rounded-md focus:outline-none focus:border-text-secondary transition-colors" placeholder="Min 6 chars">
                </div>
                <p id="settings-msg" class="text-sm hidden"></p>
                <button id="btn-save-password" class="w-full mt-2 bg-text-primary text-bg-primary font-semibold py-2 rounded-lg transition-all active:scale-95">Update Password</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
